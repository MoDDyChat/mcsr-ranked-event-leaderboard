services:
  web:
    build: .
    ports:
      - "7500:8000"
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379
      - REFRESH_INTERVAL_SECONDS=60
    volumes:
      - ./config.yaml:/app/config.yaml
    depends_on:
      - redis
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    volumes:
      - redis-data:/data
    restart: unless-stopped

volumes:
  redis-data:
